<div class="cn-wrap" style="max-width: 820px; margin: 0 auto; padding: 50px 40px; box-sizing: border-box;">

  <h1 class="cn-title">Welcome to Necromancy for the Dead Inside.</h1>

  <p>
    For the plain text version, <a href="https://creativenecromancy.wordpress.com/plain-text-version/">click here</a>.
  </p>

  <p>
    My name is Jae, and this is my culminating experience for my master of Instructional Design and Technology.
  </p>

  <p>
    Necromancy for the Dead Inside is a 100 day / 100 prompt creative practice intending to help heal and restore the inner artist in us all. We will work together as an artistic community supporting and nurturing the artists in us all.
  </p>

  <p style="margin-bottom: 30px">
    Over the next few weeks, this space will be populated with prompts intended to facilitate a practice of creative healing and rejuvenation.
  </p>

  <details style="margin-bottom: 16px">
    <summary style="font-weight: bold;font-size: 18px;cursor: pointer">How it works:</summary>
    <div style="padding: 12px 0">
      <p>
        There will be 100 prompts designed to help you think about creativity and art. We will do the prompts together, though asynchronously. You will be able to see what others before you have created from prompts and those coming after you can see what you choose to share!
        <br>
        While I encourage participating as close to daily as you can, I do not expect perfection from anyone. You can do prompts as you can, you can break a “daily” prompt up to be done over multiple days. This is your practice, you do it as you want.
      </p>
    </div>
  </details>

  <details style="margin-bottom: 16px">
    <summary style="font-weight: bold;font-size: 18px;cursor: pointer">What is needed?</summary>

    <div style="padding: 12px 0">

      <p>
        First, everything is a suggestion. Please adapt this practice to your own needs. For example, if you are visually impaired, you can use audio tools in lieu of the notebook and wall calendar.
      </p>

      <details style="margin-top: 12px">
        <summary style="font-weight: 600;cursor: pointer">A notebook with 100 sheets</summary>
        <div style="padding: 8px 0">
          <p>
            Research has shown that writing reflections after an exercise<br>
            <a href="https://wac.umn.edu/tww-program/teaching-resources/using-reflective-writing" target="_blank" rel="noopener">Improves transfer &amp; retention</a><br>
            <a href="https://www.frontiersin.org/journals/education/articles/10.3389/feduc.2020.604997/full" target="_blank" rel="noopener">Deepens experiential learning</a><br>
            <a href="https://www.cambridge.org/core/journals/advances-in-psychiatric-treatment/article/emotional-and-physical-health-benefits-of-expressive-writing/ED2976A61F5DE56B46F07A1CE9EA9F9F?utm_campaign=shareaholic&amp;utm_medium=copy_link&amp;utm_source=bookmark" target="_blank" rel="noopener">And is good for both mental and physical health!</a><br>
            Further,
            <a href="https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2023.1219945/full" target="_blank" rel="noopener">the physical act of writing, not typing, leads to widespread brain connectivity</a>. The act of physically writing helps to rewire your brain!
          </p>

          <p>
            Plus, if you have a notebook, you can doodle!
            <a href="https://www.rcn.org.uk/magazines/Wellbeing/2023/Nov/Doodling-How-can-it-improve-wellbeing" target="_blank" rel="noopener">Doodling has been shown to be good for your mental health, help build creativity, and increase engagement!</a>
          </p>

          <p>
            I prefer unlined, but lined or unlined is up to you!
            <br>
            Label sheets (not pages) 1-100 so you can easily find any given prompt. The numerical labeling also allows you to skip as needed and go back as needed.
          </p>
        </div>
      </details>

      <details style="margin-top: 12px">
        <summary style="font-weight: 600;cursor: pointer">A wall calendar</summary>
        <div style="padding: 8px 0">
          <p>
            <a href="https://kellercenter.hankamer.baylor.edu/news/story/2023/back-basics-dont-ditch-paper-planner?utm_source=chatgpt.com" target="_blank" rel="noopener">A 2023 study found participants assigned to paper calendars were more likely to complete scheduled activities than those using digital ones</a>, apparently because paper supports a big-picture view of plans.
            <a href="https://www.alibaba.com/product-insights/digital-habit-streak-calendar-vs-physical-wall-chart-which-creates-stronger-psychological-commitment-to-daily-step-goals.html" target="_blank" rel="noopener">Studies have also shown a physical calendar increases psychological commitment.</a>
          </p>
        </div>
      </details>

      <details style="margin-top: 12px">
        <summary style="font-weight: 600;cursor: pointer">A blog</summary>
        <div style="padding: 8px 0">
          <p>
            This is a little less optional. Pretty please have a blog. The blog is where you will post your art and your process. The blog can be made private, public, or any mix of the above.
            <br>
            The inspiration for this project is the
            <a href="https://en.wikipedia.org/wiki/Connectivism" target="_blank" rel="noopener">educational theory of connectivism</a>. Largely, we learn through community.
            <br>
            Not a people person? That’s fine. Neither am I. I had a panic attack yesterday when it took me 3 hours to buy a car because I couldn’t be around people anymore, I GET IT!
            <br>
            But even for us hermits (maybe especially for us hermits) growth is best built in networks and learning lives in the ability to make connections (mental and social) across the networks.
            <br>
            Yes, that is some hippy shit. But also, it’s backed by science.
            <br>
            Connectivism says knowledge lives in networks. Not just people — ideas, tools, notes, links, conversations, patterns. Learning is making connections and strengthening them. You don’t have to love people to benefit from the network; you just have to participate in it. (please.)
            <br>
            WITH THAT SAID you can also set your blog to private. And this way you can look back at your growth through these projects. And maybe one day you’ll want to share an entry. As I said above, this is YOUR practice. Yes, I have strong suggestions. But I’ll still meet you where you are.
          </p>
        </div>
      </details>

    </div>
  </details>

